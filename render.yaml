# Render blueprint for the JobWeMet FastAPI backend.
# Usage: connect this repo in Render and select the blueprint, or create a
# new "Web Service" and set the Start Command below manually.

services:
  - type: web
    name: jobwemet-backend
    runtime: python
    rootDir: backend
    # Build & start. uvicorn reads $PORT from the environment.
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn backend.main:app --host 0.0.0.0 --port $PORT
    envVars:
      # Set these in the Render dashboard (do NOT commit secrets):
      - key: PYTHON_VERSION
        value: "3.12"
      - key: GOOGLE_APPLICATION_CREDENTIALS
        sync: false          # paste the service-account JSON path or inline JSON
      - key: FIREBASE_PROJECT_ID
        sync: false
      - key: FIREBASE_STORAGE_BUCKET
        sync: false
      - key: ALLOWED_ORIGINS
        sync: false          # e.g. https://jobwemet.vercel.app
      - key: REQUIRE_AUTH
        value: "true"
      - key: DEMO_UID
        sync: false
      - key: AI_PROVIDER
        value: "openrouter"
      - key: OPENROUTER_API_KEY
        sync: false          # paste your OpenRouter key in the Render dashboard
      - key: OPENROUTER_MODEL
        value: "tencent/hy3:free"
      - key: OPENROUTER_REASONING
        value: "low"
      - key: OPENROUTER_BASE_URL
        value: "https://openrouter.ai/api/v1"
